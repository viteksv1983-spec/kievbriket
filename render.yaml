services:
  # Backend API (Docker)
  - type: web
    name: kievbriket-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kievbriket-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://kievbriket.vercel.app
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: kievbriket-db
    plan: free
    databaseName: kievbriket
    user: kievbriket_user
